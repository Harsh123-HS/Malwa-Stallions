<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malwa Stallions – Registration</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#050d1a', 800: '#091428', 700: '#0d1e3a', 600: '#122447' },
          gold:  { 400: '#f5c842', 500: '#e6b800', 300: '#fad96a', 200: '#fde89a' }
        },
        fontFamily: {
          display: ['Cinzel', 'serif'],
          body:    ['Rajdhani', 'sans-serif']
        }
      }
    }
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Rajdhani', sans-serif;
    background: #050d1a;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Stadium backdrop ── */
  .stadium-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(160deg, rgba(5,13,26,.82) 0%, rgba(9,20,40,.70) 50%, rgba(5,13,26,.90) 100%),
      url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=1600&q=80&auto=format&fit=crop') center/cover no-repeat;
  }
  .stadium-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 80%, rgba(230,184,0,.08), transparent 70%);
  }

  /* ── Glassmorphism card ── */
  .glass-card {
    background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.02) 100%);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(230,184,0,.18);
    box-shadow: 0 8px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
  }

  /* ── Step transitions ── */
  .step-wrap { position: relative; overflow: hidden; min-height: 160px; }

  .step-panel {
    position: absolute; top: 0; left: 0; right: 0;
    transition: transform .32s cubic-bezier(.4,0,.2,1), opacity .32s ease;
    will-change: transform, opacity;
  }
  .step-panel.enter-right  { transform: translateX(100%); opacity: 0; }
  .step-panel.enter-left   { transform: translateX(-100%); opacity: 0; }
  .step-panel.active       { transform: translateX(0);   opacity: 1; position: relative; }
  .step-panel.exit-left    { transform: translateX(-100%); opacity: 0; }
  .step-panel.exit-right   { transform: translateX(100%);  opacity: 0; }

  /* ── Inputs ── */
  .field-input {
    width: 100%;
    background: rgba(255,255,255,.06);
    border: 1.5px solid rgba(230,184,0,.25);
    border-radius: 10px;
    color: #f0e6c8;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    padding: .72rem 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s, transform .18s;
  }
  .field-input::placeholder { color: rgba(240,230,200,.35); }
  .field-input:focus {
    border-color: rgba(230,184,0,.7);
    box-shadow: 0 0 0 3px rgba(230,184,0,.12);
    transform: scale(1.012);
    background: rgba(255,255,255,.09);
  }
  .field-input:read-only { opacity: .65; cursor: default; }
  select.field-input option { background: #091428; color: #f0e6c8; }

  /* ── File input ── */
  .file-label {
    display: flex; align-items: center; gap: .75rem;
    background: rgba(255,255,255,.06);
    border: 1.5px dashed rgba(230,184,0,.35);
    border-radius: 10px;
    padding: .85rem 1rem;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    color: rgba(240,230,200,.65);
    font-size: .95rem;
  }
  .file-label:hover { border-color: rgba(230,184,0,.7); background: rgba(255,255,255,.09); }
  .file-label .file-icon { font-size: 1.5rem; }

  /* ── Buttons ── */
  .btn-gold {
    background: linear-gradient(135deg, #e6b800 0%, #f5c842 50%, #e6b800 100%);
    background-size: 200% 100%;
    color: #050d1a;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: .08em;
    padding: .72rem 2rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background-position .3s, box-shadow .3s, transform .15s;
    text-transform: uppercase;
  }
  .btn-gold:hover {
    background-position: 100% 0;
    box-shadow: 0 0 22px rgba(230,184,0,.55), 0 4px 12px rgba(0,0,0,.4);
    transform: translateY(-1px);
  }
  .btn-gold:active { transform: translateY(0) scale(.98); }

  .btn-ghost {
    background: transparent;
    color: rgba(240,230,200,.65);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: .06em;
    padding: .72rem 1.5rem;
    border: 1.5px solid rgba(240,230,200,.2);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .2s, color .2s, transform .15s;
    text-transform: uppercase;
  }
  .btn-ghost:hover { border-color: rgba(230,184,0,.5); color: #f5c842; transform: translateY(-1px); }

  /* ── Progress bar ── */
  #progress-fill { transition: width .35s cubic-bezier(.4,0,.2,1); }

  /* ── Error ── */
  .err-msg { color: #ff7b7b; font-size: .85rem; margin-top: .35rem; display: none; }
  .err-msg.show { display: block; animation: shake .3s ease; }
  @keyframes shake {
    0%,100%{ transform: translateX(0) }
    25%    { transform: translateX(-5px) }
    75%    { transform: translateX(5px) }
  }

  /* ── Success screen ── */
  #success-screen { display: none; }
  #success-screen.show { display: flex; animation: fadeIn .5s ease; }
  @keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }

  /* ── Lion SVG glow ── */
  .lion-glow { filter: drop-shadow(0 0 14px rgba(230,184,0,.55)); }

  /* ── Step dots ── */
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.18);
    transition: background .3s, transform .3s;
    flex-shrink: 0;
  }
  .step-dot.done    { background: rgba(230,184,0,.5); }
  .step-dot.current { background: #f5c842; transform: scale(1.5); }

  /* ── Confetti ── */
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(420px) rotate(720deg); opacity: 0; }
  }
  .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confetti-fall 1.6s ease forwards; }
</style>
</head>
<body>

<!-- Stadium backdrop -->
<div class="stadium-bg"></div>

<!-- Page wrapper -->
<div class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-lg">

    <!-- Logo + branding -->
    <div class="flex flex-col items-center mb-7 select-none">
      <img src="./Logo.png" alt="" class="md:w-44 md:h-44 w-24 ">
      <!-- <h1 class="font-display text-2xl md:text-5xl text-gold-400 tracking-widest text-center leading-tight">MALWA STALLIONS</h1> -->
      <p class="font-body text-gold-300 text-sm tracking-[.25em] mt-1 opacity-80">JOIN THE PRIDE</p>
      <div class="w-24 h-px bg-gradient-to-r from-transparent via-gold-500 to-transparent mt-3"></div>
    </div>

    <!-- Glass card -->
    <div class="glass-card rounded-2xl p-6 md:p-8">

      <!-- Progress bar -->
      <div class="mb-5">
        <div class="flex justify-between items-center mb-2">
          <span class="font-body md:text-lg text-gold-300 tracking-widest uppercase">Registration Progress</span>
          <span id="step-counter" class="font-body md:text-lg text-xs text-gold-400 font-semibold"></span>
        </div>
        <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
          <div id="progress-fill" class="h-full rounded-full bg-gradient-to-r from-gold-500 to-gold-300" style="width:0%"></div>
        </div>
        <!-- Step dots -->
        <div id="step-dots" class="flex justify-center gap-1.5 mt-3 flex-wrap"></div>
      </div>

      <!-- Form -->
      <form id="reg-form" novalidate>
        <div class="step-wrap" id="step-wrap"></div>

        <!-- Navigation buttons -->
        <div class="flex gap-3 mt-6" id="nav-buttons">
          <button type="button" id="btn-back"  class="btn-ghost flex-1 hidden">← Back</button>
          <button type="button" id="btn-next"  class="btn-gold flex-1">Next →</button>
          <button type="button" id="btn-submit" class="btn-gold flex-1 hidden">Submit ✦</button>
        </div>
      </form>

      <!-- Success screen -->
      <div id="success-screen" class="flex-col items-center justify-center text-center py-6 relative overflow-hidden">
        <div id="confetti-container" class="absolute inset-0 pointer-events-none"></div>
        <div class="text-6xl mb-4 animate-bounce">🏆</div>
        <h2 class="font-display text-2xl text-gold-400 tracking-widest mb-2">REGISTERED!</h2>
        <p class="font-body text-gold-200 text-lg mb-1">Welcome to Malwa Stallions</p>
        <p class="font-body text-white/50 text-sm">Your application has been received.<br>We'll contact you shortly.</p>
        <div class="mt-5 w-16 h-px bg-gradient-to-r from-transparent via-gold-500 to-transparent mx-auto"></div>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center font-body text-white/20 text-xs mt-5 tracking-wider">© 2026 MALWA STALLIONS CRICKET ACADEMY</p>
  </div>
</div>

<script>
// ── Step definitions ──────────────────────────────────────────
const STEPS = [
  {
    id: 'fullName', label: 'Full Name', type: 'text',
    placeholder: 'Enter your full name', required: true,
    hint: 'As per official ID'
  },
  {
    id: 'dob', label: 'Date of Birth', type: 'date',
    required: true, hint: 'Used to auto-calculate your age'
  },
  {
    id: 'age', label: 'Age', type: 'number',
    placeholder: 'Auto-calculated', required: false,
    readonly: true, hint: 'Calculated from your date of birth'
  },
  {
    id: 'mobile', label: 'Mobile Number', type: 'tel',
    placeholder: '+91 XXXXX XXXXX', required: true,
    hint: 'WhatsApp preferred'
  },
  {
    id: 'email', label: 'Email ID', type: 'email',
    placeholder: 'you@example.com', required: false,
    hint: 'Optional — for confirmation emails'
  },
  {
    id: 'city', label: 'City / District', type: 'text',
    placeholder: 'e.g. Indore, Ujjain', required: true,
    hint: 'Your current city or district'
  },
  {
    id: 'state', label: 'State', type: 'text',
    placeholder: 'e.g. Madhya Pradesh', required: true
  },
  {
    id: 'gender', label: 'Gender', type: 'text',
    placeholder: 'Male', required: false,
    readonly: true, defaultValue: 'Male',
    hint: 'Tournament is open to male players'
  },
  {
    id: 'height', label: 'Height (cm)', type: 'number',
    placeholder: 'e.g. 175', required: true
  },
  {
    id: 'weight', label: 'Weight (kg)', type: 'number',
    placeholder: 'e.g. 70', required: false,
    hint: 'Optional'
  },
  {
    id: 'bowlingStyle', label: 'Bowling Style', type: 'select',
    required: false,
    options: ['Select Bowling Style','Right-arm fast','Right-arm medium','Left-arm fast','Left-arm spin','Off-spin','Leg-spin']
  },
  {
    id: 'experience', label: 'Playing Experience (Years)', type: 'number',
    placeholder: 'e.g. 5', required: true
  },
  {
    id: 'highestLevel', label: 'Highest Level Played', type: 'select',
    required: true,
    options: ['Select Level','School','Club','District','State']
  },
  {
    id: 'shirtSize', label: 'Shirt Size', type: 'select',
    required: false,
    options: ['Select Size','S','M','L','XL']
  },
  {
    id: 'photo', label: 'Passport Photo', type: 'file',
    accept: 'image/*', required: false,
    hint: 'Clear face photo (JPG/PNG)'
  },
  {
    id: 'idProof', label: 'ID Proof', type: 'file',
    accept: 'image/*,application/pdf', required: false,
    hint: 'Aadhaar / School ID / Any govt. ID'
  }
];

const TOTAL = STEPS.length;
let current = 0;
const values = {};

// ── Build dots ────────────────────────────────────────────────
const dotsContainer = document.getElementById('step-dots');
STEPS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'step-dot';
  d.id = `dot-${i}`;
  dotsContainer.appendChild(d);
});

// ── Build all panels ──────────────────────────────────────────
const wrap = document.getElementById('step-wrap');

STEPS.forEach((step, i) => {
  const panel = document.createElement('div');
  panel.className = 'step-panel' + (i === 0 ? ' active' : ' enter-right');
  panel.id = `panel-${i}`;

  let inputHTML = '';

  if (step.type === 'select') {
    inputHTML = `<select id="input-${step.id}" class="field-input">
      ${step.options.map((o,idx) => `<option value="${idx===0?'':o}">${o}</option>`).join('')}
    </select>`;
  } else if (step.type === 'file') {
    inputHTML = `
      <input type="file" id="input-${step.id}" accept="${step.accept||'*'}" class="hidden" onchange="handleFile(this,'${step.id}')">
      <label for="input-${step.id}" class="file-label" id="file-label-${step.id}">
        <span class="file-icon">📎</span>
        <span id="file-text-${step.id}">Tap to upload ${step.label}</span>
      </label>`;
  } else {
    inputHTML = `<input
      type="${step.type}"
      id="input-${step.id}"
      class="field-input"
      placeholder="${step.placeholder||''}"
      ${step.readonly ? 'readonly' : ''}
      ${step.type==='date' ? 'max="'+new Date().toISOString().split('T')[0]+'"' : ''}
    >`;
  }

  panel.innerHTML = `
    <div class="mb-1">
      <label class="font-body text-gold-300 text-xs tracking-[.18em] uppercase font-semibold">
        Step ${i+1} of ${TOTAL}
      </label>
      <h3 class="font-body text-white md:text-3xl text-xl font-semibold mt-0.5">${step.label}
        ${step.required ? '<span class="text-gold-400 text-base">*</span>' : '<span class="text-white/30 text-xs font-normal ml-1">(optional)</span>'}
      </h3>
      ${step.hint ? `<p class="font-body text-white/40 text-sm mt-0.5">${step.hint}</p>` : ''}
    </div>
    <div class="mt-3">
      ${inputHTML}
      <div class="err-msg" id="err-${step.id}">⚠ This field is required</div>
    </div>
  `;
  wrap.appendChild(panel);
});

// Pre-fill gender & age
document.getElementById('input-gender').value = 'Male';

// Auto-calc age from DOB
document.getElementById('input-dob').addEventListener('change', e => {
  const dob = new Date(e.target.value);
  if (!isNaN(dob)) {
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    if (today < new Date(today.getFullYear(), dob.getMonth(), dob.getDate())) age--;
    document.getElementById('input-age').value = age;
  }
});

// File handler
function handleFile(input, id) {
  const name = input.files[0]?.name || 'No file chosen';
  document.getElementById(`file-text-${id}`).textContent = '✓ ' + name;
}

// ── UI update ─────────────────────────────────────────────────
function updateUI() {
  const pct = Math.round((current / (TOTAL - 1)) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('step-counter').textContent = `${current + 1} / ${TOTAL}`;

  STEPS.forEach((_, i) => {
    const dot = document.getElementById(`dot-${i}`);
    dot.className = 'step-dot' + (i < current ? ' done' : i === current ? ' current' : '');
  });

  const btnBack   = document.getElementById('btn-back');
  const btnNext   = document.getElementById('btn-next');
  const btnSubmit = document.getElementById('btn-submit');

  btnBack.classList.toggle('hidden', current === 0);
  btnNext.classList.toggle('hidden',  current === TOTAL - 1);
  btnSubmit.classList.toggle('hidden', current < TOTAL - 1);
}

// ── Transition ────────────────────────────────────────────────
function goTo(next, direction) {
  const fromPanel = document.getElementById(`panel-${current}`);
  const toPanel   = document.getElementById(`panel-${next}`);

  fromPanel.className = 'step-panel ' + (direction > 0 ? 'exit-left' : 'exit-right');
  toPanel.className   = 'step-panel ' + (direction > 0 ? 'enter-right' : 'enter-left');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      toPanel.className = 'step-panel active';
      setTimeout(() => { fromPanel.className = 'step-panel enter-right'; }, 350);
    });
  });

  current = next;
  updateUI();
}

// ── Validate ──────────────────────────────────────────────────
function validate(idx) {
  const step = STEPS[idx];
  if (!step.required) return true;

  let val = '';
  if (step.type === 'file') {
    const el = document.getElementById(`input-${step.id}`);
    val = el.files.length > 0 ? 'ok' : '';
  } else {
    val = (document.getElementById(`input-${step.id}`)?.value || '').trim();
  }

  const err = document.getElementById(`err-${step.id}`);
  if (!val) {
    err.classList.add('show');
    return false;
  }
  err.classList.remove('show');
  return true;
}

// ── Navigation ────────────────────────────────────────────────
document.getElementById('btn-next').addEventListener('click', () => {
  if (!validate(current)) return;
  if (current < TOTAL - 1) goTo(current + 1, 1);
});

document.getElementById('btn-back').addEventListener('click', () => {
  if (current > 0) goTo(current - 1, -1);
});

// ── Submit ────────────────────────────────────────────────────
document.getElementById('btn-submit').addEventListener('click', () => {
  if (!validate(current)) return;

  document.getElementById('reg-form').style.display   = 'none';
  document.getElementById('nav-buttons').style.display = 'none';

  const ss = document.getElementById('success-screen');
  ss.classList.add('show');

  // Confetti
  const cc = document.getElementById('confetti-container');
  const colors = ['#f5c842','#e6b800','#fde89a','#ffffff','#c0392b','#27ae60'];
  for (let i = 0; i < 48; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*.8}s;
      animation-duration:${1.2+Math.random()*.8}s;
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'3px'};
    `;
    cc.appendChild(p);
  }
});

// Enter key → next
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const nextBtn   = document.getElementById('btn-next');
    const submitBtn = document.getElementById('btn-submit');
    if (!nextBtn.classList.contains('hidden')) nextBtn.click();
    else if (!submitBtn.classList.contains('hidden')) submitBtn.click();
  }
});

// ── Init ──────────────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
